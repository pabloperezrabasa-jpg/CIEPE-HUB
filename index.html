<script type="text/babel">
// Firebase se inicializa aqui adentro para garantizar que
// los scripts de arriba ya cargaron cuando este bloque ejecuta
const firebaseConfig = {
  apiKey:            "AIzaSyB3UnTPdojbnChToQqvL2OOdqbz3v5e-4g",
  authDomain:        "ciepe---hub.firebaseapp.com",
  projectId:         "ciepe---hub",
  storageBucket:     "ciepe---hub.firebasestorage.app",
  messagingSenderId: "622358314474",
  appId:             "1:622358314474:web:33b12436b9599a812b8693"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();
const db   = firebase.firestore();
const FieldValue = firebase.firestore.FieldValue;

const { useState, useEffect } = React;

// ── COLORES ───────────────────────────────────────────────────────────────────
const TEAL_D = "#0F4446";
const TEAL   = "#17666A";
const TEAL_L = "#E6F2F2";
const GOLD   = "#C4993A";
const GOLD_L = "#FBF5E8";
const WHITE  = "#FFFFFF";
const OFF_W  = "#F4EFE7";
const TEXT   = "#1A1A1A";
const MUTED  = "#6B7B7B";
const BORDER = "#D8E8E8";

const MONTHS   = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const fmt      = d => { if(!d)return"—"; const[y,m,day]=d.split("-"); return`${parseInt(day)} ${MONTHS[parseInt(m)-1]} ${y}`; };
const daysLeft = d => { if(!d)return null; return Math.ceil((new Date(d)-new Date())/86400000); };

const TIPO_C = {Ponencia:TEAL,Panel:"#5B4A8A",Seminario:"#2E7D52",Charla:GOLD,Webinar:"#B05E1A",Lanzamiento:"#A02828"};
const ESTADO_C = {Confirmado:"#2E7D52","En preparación":GOLD,Propuesto:"#9AA",Realizado:TEAL,Cancelado:"#A02828",Abierta:"#2E7D52",Próximamente:GOLD,Cerrada:"#9AA",Activo:"#2E7D52","En formación":GOLD,"En pausa":"#9AA"};

// ── COMPONENTES ATOM ──────────────────────────────────────────────────────────
const Badge     = ({t}) => { const c=ESTADO_C[t]||"#9AA"; return <span style={{padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",background:c+"22",color:c,display:"inline-block"}}>{t}</span>; };
const TipoBadge = ({t}) => { const c=TIPO_C[t]||MUTED; return <span style={{padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",background:c+"22",color:c,display:"inline-block"}}>{t}</span>; };
const MetaRow   = ({icon,text,accent}) => <span style={{color:accent?TEAL:MUTED,display:"flex",alignItems:"center",gap:4,fontSize:12}}><span>{icon}</span>{text}</span>;
const Empty     = ({msg}) => <div style={{textAlign:"center",padding:"52px 24px",color:"#BCC8C8",fontSize:13,fontStyle:"italic",lineHeight:1.7}}>{msg}</div>;

function Toast({msg}) {
  return <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
    background:TEAL_D,color:WHITE,padding:"12px 24px",borderRadius:8,fontSize:13,
    boxShadow:"0 8px 32px rgba(0,0,0,0.3)",zIndex:2000,borderLeft:`4px solid ${GOLD}`,
    whiteSpace:"nowrap",maxWidth:"90vw"}}>{msg}</div>;
}

function DateBox({fecha}) {
  if(!fecha) return <div style={{minWidth:52,height:62}}/>;
  const[y,m,day]=fecha.split("-");
  return <div style={{minWidth:52,textAlign:"center",borderRadius:8,flexShrink:0,
    background:TEAL_L,borderTop:`3px solid ${TEAL}`,padding:"8px 6px"}}>
    <div style={{fontSize:24,fontWeight:700,color:TEAL,fontFamily:"'Cormorant Garamond',serif",lineHeight:1}}>{parseInt(day)}</div>
    <div style={{fontSize:10,color:TEAL+"99",textTransform:"uppercase",fontWeight:700,letterSpacing:"0.06em"}}>{MONTHS[parseInt(m)-1]}</div>
    <div style={{fontSize:9,color:"#AAA"}}>{y}</div>
  </div>;
}

const inp = {width:"100%",padding:"8px 11px",border:`1px solid ${BORDER}`,borderRadius:6,
  fontSize:13,boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif",outline:"none",
  color:TEXT,background:WHITE};

const Field = ({label,children}) =>
  <div style={{marginBottom:14}}>
    <label style={{display:"block",fontSize:11,fontWeight:600,color:MUTED,
      marginBottom:4,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</label>
    {children}
  </div>;

function Inp({k,label,type="text",opts,fd,sf}) {
  return <Field label={label}>{
    opts
      ? <select value={fd[k]||""} onChange={e=>sf(k,e.target.value)} style={inp}>
          <option value="">—</option>{opts.map(o=><option key={o}>{o}</option>)}
        </select>
      : type==="textarea"
        ? <textarea value={fd[k]||""} onChange={e=>sf(k,e.target.value)} rows={3}
            style={{...inp,resize:"vertical"}}/>
        : <input type={type} value={fd[k]||""} onChange={e=>sf(k,e.target.value)}
            style={inp}/>
  }</Field>;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen() {
  const [mode,setMode]         = useState("login");
  const [email,setEmail]       = useState("");
  const [pass,setPass]         = useState("");
  const [nombre,setNombre]     = useState("");
  const [apellido,setApellido] = useState("");
  const [institucion,setInst]  = useState("");
  const [error,setError]       = useState("");
  const [loading,setLoading]   = useState(false);

  async function submit() {
    setError(""); setLoading(true);
    try {
      if (mode==="login") {
        await auth.signInWithEmailAndPassword(email, pass);
      } else {
        if (!nombre||!apellido) { setError("Ingresá nombre y apellido."); setLoading(false); return; }
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        const snap = await db.collection("usuarios").get();
        const role = snap.empty ? "admin" : "member";
        await db.collection("usuarios").doc(cred.user.uid).set({
          nombre, apellido, institucion, email, role,
          creadoEn: FieldValue.serverTimestamp()
        });
      }
    } catch(e) {
      const msgs = {
        "auth/user-not-found":"Usuario no encontrado.",
        "auth/wrong-password":"Contraseña incorrecta.",
        "auth/email-already-in-use":"El correo ya está registrado.",
        "auth/weak-password":"La contraseña debe tener al menos 6 caracteres.",
        "auth/invalid-email":"Correo inválido.",
        "auth/invalid-credential":"Correo o contraseña incorrectos."
      };
      setError(msgs[e.code]||e.message);
    }
    setLoading(false);
  }

  return (
    <div style={{minHeight:"100vh",background:TEAL_D,display:"flex",
      alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:WHITE,borderRadius:16,padding:36,width:"100%",

// ── MODAL ADD/EDIT ────────────────────────────────────────────────────────────
function EntryModal({type,initial,onSave,onClose}) {
  const [fd,setFd] = useState(initial||{});
  const sf = (k,v) => setFd(f=>({...f,[k]:v}));
  const isEdit = !!initial?.id;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,30,30,0.6)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
      <div style={{background:WHITE,borderRadius:12,padding:28,width:"100%",
        maxWidth:500,maxHeight:"90vh",overflowY:"auto",
        boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>

        <div style={{display:"flex",justifyContent:"space-between",
          alignItems:"center",marginBottom:22}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:4,height:22,background:isEdit?GOLD:TEAL,borderRadius:2}}/>
            <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,
              fontWeight:600,color:TEXT,margin:0}}>
              {isEdit?"Editar":"Nueva"}{" "}
              {type==="cal"&&"actividad"}{type==="lab"&&"laboratorio"}
              {type==="pub"&&"publicación"}{type==="conv"&&"convocatoria"}

// ── MODAL ADHESIÓN ────────────────────────────────────────────────────────────
function JoinModal({lab,onClose,profile}) {
  const [fd,setFd] = useState({
    nombre:     (profile?.nombre||"")+" "+(profile?.apellido||""),
    email:      profile?.email||"",
    institucion:profile?.institucion||"",
    motivacion: ""
  });
  const sf = (k,v) => setFd(f=>({...f,[k]:v}));
  const [sent,setSent] = useState(false);

  async function send() {
    if (!fd.nombre||!fd.email) return;
    await db.collection("solicitudes").add({
      ...fd, laboratorio:lab.nombre, estado:"Pendiente",
      creadoEn:FieldValue.serverTimestamp()
    });
    setSent(true);
    setTimeout(onClose,2500);
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,30,30,0.6)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>
      <div style={{background:WHITE,borderRadius:12,padding:28,width:"100%",
        maxWidth:480,boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>
        {sent
          ? <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:40,marginBottom:14}}>✅</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:TEXT}}>Solicitud enviada.</div>

          : <>
              <div style={{borderLeft:`4px solid ${GOLD}`,paddingLeft:14,marginBottom:20}}>
                <div style={{fontSize:10,fontWeight:700,color:GOLD,textTransform:"uppercase",
                  letterSpacing:"0.07em",marginBottom:3}}>Solicitud de adhesión</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,
                  fontWeight:600,color:TEXT,lineHeight:1.3}}>{lab.nombre}</div>

// ── CHART COMPONENT ─────────────────────────────────────────────────────────
function ChartBar({data, labels, colors}){
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current||!window.Chart) return;
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new window.Chart(ref.current, {
      type:"bar",
      data:{labels, datasets:[{data, backgroundColor:colors||labels.map((_,i)=>[TEAL,GOLD,"#5B4A8A","#2E7D52","#C0392B","#E67E22"][i%6]), borderRadius:4, borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:MUTED,font:{size:10}}},y:{grid:{color:"#F0F0F0"},ticks:{color:MUTED,font:{size:10},precision:0},beginAtZero:true}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[JSON.stringify(data),JSON.stringify(labels)]);
  return <div style={{position:"relative",height:150}}><canvas ref={ref}/></div>;
}

function ChartDoughnut({data, labels, colors}){
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current||!window.Chart) return;
    if(chartRef.current) chartRef.current.destroy();
    const total = data.reduce((a,b)=>a+b,0);
    chartRef.current = new window.Chart(ref.current, {
      type:"doughnut",
      data:{labels, datasets:[{data, backgroundColor:colors||[TEAL,GOLD,"#5B4A8A","#2E7D52","#C0392B","#E67E22","#3498DB"], borderWidth:2, borderColor:"#fff", hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"65%",plugins:{legend:{position:"bottom",labels:{font:{size:9},padding:6,color:MUTED,boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed} (${total?Math.round(ctx.parsed/total*100):0}%)`}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[JSON.stringify(data),JSON.stringify(labels)]);
  return <div style={{position:"relative",height:170}}><canvas ref={ref}/></div>;
}

// ── YOUTUBE HELPER ───────────────────────────────────────────────────────────
function ytId(url){
  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  return m ? m[1] : null;
}

                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowFullScreen/>
              : <div onClick={()=>id&&setPlaying(v.id)}
                  style={{position:"absolute",inset:0,cursor:id?"pointer":"default",
                    background:`url(https://img.youtube.com/vi/${id||""}/hqdefault.jpg) center/cover no-repeat #111`,
                    display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {id && <div style={{width:54,height:54,borderRadius:"50%",
                    background:"rgba(255,0,0,0.85)",display:"flex",alignItems:"center",
                    justifyContent:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
                    <span style={{fontSize:20,marginLeft:4,color:WHITE}}>▶</span>
                  </div>}
                </div>
            }
          </div>
          {/* Info */}
          <div style={{padding:"14px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                {v.laboratorio && <div style={{fontSize:9,fontWeight:700,color:GOLD,
                  textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>
                  🔬 {v.laboratorio}
                </div>}
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,
                  color:TEXT,lineHeight:1.3,marginBottom:6}}>{v.titulo}</div>
                <div style={{fontSize:11,color:MUTED,display:"flex",flexWrap:"wrap",gap:"4px 14px"}}>
                  {v.ponente && <MetaRow icon="🎙" text={v.ponente}/>}
                  {v.fecha   && <MetaRow icon="📅" text={fmt(v.fecha)}/>}
                </div>
                {v.descripcion && <div style={{fontSize:12,color:"#555",marginTop:8,
                  lineHeight:1.6}}>{v.descripcion}</div>}
              </div>
              {isAdmin && <button onClick={()=>onDelete(v.id)}
                style={{background:"none",border:"none",cursor:"pointer",color:"#DDD",
                  fontSize:16,padding:"2px 4px",flexShrink:0}}>✕</button>}
            </div>
            {id && !isPlaying && <button onClick={()=>setPlaying(v.id)}
              style={{marginTop:10,background:TEAL_L,border:`1px solid ${TEAL}33`,
                color:TEAL,borderRadius:6,padding:"6px 14px",cursor:"pointer",
                fontSize:12,fontWeight:600,fontFamily:"inherit",display:"flex",
                alignItems:"center",gap:5}}>
              ▶ Ver ponencia
            </button>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── MODAL PARA CARGAR VIDEO ───────────────────────────────────────────────────
function VideoModal({onSave, onClose}){
  const [fd, setFd] = React.useState({youtubeUrl:"",titulo:"",ponente:"",fecha:"",laboratorio:"",descripcion:""});
  const sf = (k,v) => setFd(f=>({...f,[k]:v}));
  const id = ytId(fd.youtubeUrl);

  const LABS_OPTS = [
    "Bioética aplicada y retos del siglo XXI",
    "Crimen, comunicación y percepción pública",
    "Educación, liderazgo y justicia social",
    "Filosofía del riesgo y justicia epistémica",
    "Filosofía, ética y educación en ciencias",
    "Inteligencia artificial, derecho y filosofía",
    "Métodos experimentales para mercados e instituciones",
    "Ética y conocimiento",
  ];

  return <div style={{position:"fixed",inset:0,background:"rgba(10,30,30,0.6)",
    display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
    <div style={{background:WHITE,borderRadius:12,padding:24,width:"100%",
      maxWidth:460,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:4,height:20,background:TEAL,borderRadius:2}}/>
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:600,color:TEXT,margin:0}}>Agregar video</h3>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#AAA",fontSize:20,padding:4}}>✕</button>
      </div>

      {/* Link de YouTube */}
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:10,fontWeight:600,color:MUTED,marginBottom:3,
          textTransform:"uppercase",letterSpacing:"0.07em"}}>Link de YouTube *</label>
        <input value={fd.youtubeUrl} onChange={e=>sf("youtubeUrl",e.target.value)}
          placeholder="https://youtu.be/... o https://youtube.com/watch?v=..."
          style={{width:"100%",padding:"8px 10px",border:`1px solid ${id?"#2E7D52":BORDER}`,
            borderRadius:6,fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",
            color:TEXT,background:WHITE,boxSizing:"border-box"}}/>
        {fd.youtubeUrl && !id && <div style={{fontSize:11,color:"#A02828",marginTop:4}}>
          Link no reconocido — probá con el formato youtu.be/ID
        </div>}
        {id && <div style={{fontSize:11,color:"#2E7D52",marginTop:4}}>✅ Video detectado correctamente</div>}
      </div>

      {/* Preview thumbnail */}
      {id && <div style={{marginBottom:12,borderRadius:8,overflow:"hidden",border:`1px solid ${BORDER}`}}>
        <img src={`https://img.youtube.com/vi/${id}/hqdefault.jpg`} alt="preview"
          style={{width:"100%",display:"block"}}/>
      </div>}

      {[
        {k:"titulo",     label:"Título de la ponencia *", ph:"Ej: Bioética y decisiones clínicas"},
        {k:"ponente",    label:"Ponente",                  ph:"Nombre del/la ponente"},
        {k:"fecha",      label:"Fecha",                    type:"date"},
        {k:"descripcion",label:"Descripción breve",        type:"textarea"},
      ].map(({k,label,ph,type})=>(
        <div key={k} style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:10,fontWeight:600,color:MUTED,marginBottom:3,
            textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</label>
          {type==="textarea"
            ? <textarea value={fd[k]} onChange={e=>sf(k,e.target.value)}
                placeholder={ph} rows={3}
                style={{width:"100%",padding:"8px 10px",border:`1px solid ${BORDER}`,
                  borderRadius:6,fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",
                  color:TEXT,background:WHITE,boxSizing:"border-box",resize:"vertical"}}/>
            : <input type={type||"text"} value={fd[k]} onChange={e=>sf(k,e.target.value)}
                placeholder={ph}
                style={{width:"100%",padding:"8px 10px",border:`1px solid ${BORDER}`,
                  borderRadius:6,fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",
                  color:TEXT,background:WHITE,boxSizing:"border-box"}}/>
          }
        </div>
      ))}

      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:10,fontWeight:600,color:MUTED,marginBottom:3,
          textTransform:"uppercase",letterSpacing:"0.07em"}}>Laboratorio</label>
        <select value={fd.laboratorio} onChange={e=>sf("laboratorio",e.target.value)}
          style={{width:"100%",padding:"8px 10px",border:`1px solid ${BORDER}`,
            borderRadius:6,fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",
            color:TEXT,background:WHITE,boxSizing:"border-box"}}>
          <option value="">— Sin asignar —</option>
          {LABS_OPTS.map(l=><option key={l}>{l}</option>)}
        </select>
      </div>

      <button onClick={()=>onSave(fd)} disabled={!id||!fd.titulo}
        style={{width:"100%",background:(!id||!fd.titulo)?"#CCC":TEAL,color:WHITE,
          border:"none",padding:"11px",borderRadius:7,cursor:(!id||!fd.titulo)?"not-allowed":"pointer",
          fontSize:14,fontWeight:600,fontFamily:"inherit"}}>
        Guardar video
      </button>
    </div>
  </div>;
}

function MainApp({profile,onLogout}) {
  const [tab,setTab]     = useState("cal");
  const [acts,setActs]   = useState([]);
  const [labs,setLabs]   = useState([]);
  const [pubs,setPubs]   = useState([]);
  const [convs,setConvs] = useState([]);
  const [vids,setVids]   = useState([]);
  const [sols,setSols]   = useState([]);
  const [modal,setModal] = useState(null);
  const [videoModal,setVideoModal] = useState(false);
  const [joinLab,setJoinLab] = useState(null);
  const [toast,setToast] = useState(null);

  const isAdmin = profile?.role==="admin";

  function notify(msg) { setToast(msg); setTimeout(()=>setToast(null),3500); }

  useEffect(()=>{
    const unsubs = [
      db.collection("actividades").orderBy("fecha").onSnapshot(
        s=>setActs(s.docs.map(d=>({id:d.id,...d.data()}))),
        ()=>db.collection("actividades").onSnapshot(s=>setActs(s.docs.map(d=>({id:d.id,...d.data()}))))
      ),
      db.collection("laboratorios").orderBy("nombre").onSnapshot(
        s=>setLabs(s.docs.map(d=>({id:d.id,...d.data()}))),
        ()=>db.collection("laboratorios").onSnapshot(s=>setLabs(s.docs.map(d=>({id:d.id,...d.data()}))))
      ),
      db.collection("publicaciones").onSnapshot(s=>setPubs(s.docs.map(d=>({id:d.id,...d.data()})))),
      db.collection("convocatorias").onSnapshot(s=>setConvs(s.docs.map(d=>({id:d.id,...d.data()})))),
      db.collection("videos").orderBy("fecha","desc").onSnapshot(
        s=>setVids(s.docs.map(d=>({id:d.id,...d.data()}))),
        ()=>db.collection("videos").onSnapshot(s=>setVids(s.docs.map(d=>({id:d.id,...d.data()}))))
      ),
      db.collection("solicitudes").where("estado","==","Pendiente")
        .onSnapshot(s=>setSols(s.docs.map(d=>({id:d.id,...d.data()})))),
    ];
    return ()=>unsubs.forEach(u=>u());
  },[]);

  const COL = {cal:"actividades",lab:"laboratorios",pub:"publicaciones",conv:"convocatorias"};

  async function handleSave(data) {
    const col = COL[modal.type];
    if (data.id) {
      const {id,...rest} = data;
      await db.collection(col).doc(id).update(rest);
      notify("Registro actualizado.");
    } else {
      await db.collection(col).add({...data, creadoEn:FieldValue.serverTimestamp()});
      notify("Registro guardado.");
    }
    setModal(null);
  }

  async function handleSaveVideo(data){
    const id = ytId(data.youtubeUrl);
    if(!id||!data.titulo) return;
    await db.collection("videos").add({

      youtubeId: id,
      creadoEn: FieldValue.serverTimestamp()

    notify("Video guardado.");

  async function handleDeleteVideo(vid){
    if(!confirm("¿Eliminar este video?")) return;

    notify("Video eliminado.");

  async function del(col,id) {
    if (!confirm("¿Confirmar eliminación?")) return;

    notify("Eliminado.");

  const cur    = TABS.find(t=>t.id===tab);
  const counts = {cal:acts.length,lab:labs.length,pub:pubs.length,conv:convs.length,vid:vids.length};

  const EditDel = ({type,item}) => isAdmin
    ? <div style={{display:"flex",gap:2,flexShrink:0}}>
        <button onClick={()=>setModal({type,item})} title="Editar"
          style={{background:"none",border:"none",cursor:"pointer",
            color:TEAL,fontSize:16,padding:"4px 6px",lineHeight:1}}>✎</button>
        <button onClick={()=>del(COL[type],item.id)} title="Eliminar"

            <div>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                <span style={{fontFamily:"'Cormorant Garamond',serif",color:WHITE,
                  fontSize:24,fontWeight:600,letterSpacing:"0.06em",lineHeight:1}}>CIEPE</span>
                <span style={{width:1,height:14,background:"rgba(255,255,255,0.2)",
                  display:"inline-block",marginBottom:1}}/>
                <span style={{color:GOLD,fontSize:10,letterSpacing:"0.14em",
                  textTransform:"uppercase",fontWeight:500}}>Hub Académico</span>
              </div>
              <div style={{color:"rgba(255,255,255,0.3)",fontSize:9,
                letterSpacing:"0.1em",textTransform:"uppercase",marginTop:2}}>
                Ética · Política · Economía
              </div>
            </div>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{textAlign:"right"}}>
              <div style={{color:"rgba(255,255,255,0.9)",fontSize:12,fontWeight:500,lineHeight:1}}>
                {profile?.nombre} {profile?.apellido}
              </div>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,marginTop:2}}>
                {isAdmin?"Coordinador Académico":"Investigador"}
              </div>
              {isAdmin && sols.length>0 &&
                <div style={{fontSize:10,color:GOLD,marginTop:2,fontWeight:600}}>
                  {sols.length} solicitud{sols.length>1?"es":""} pendiente{sols.length>1?"s":""}
                </div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:GOLD,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:13,fontWeight:700,color:TEAL_D}}>
                {(profile?.nombre||"?")[0]}{(profile?.apellido||"")[0]}
              </div>
              <button onClick={onLogout} style={{background:"none",border:"none",
                cursor:"pointer",color:"rgba(255,255,255,0.25)",fontSize:9,
                fontFamily:"inherit",padding:0,letterSpacing:"0.04em"}}>salir</button>
            </div>
          </div>
        </div>

        <div style={{display:"flex",padding:"0 14px",
          borderTop:"1px solid rgba(255,255,255,0.07)",overflowX:"auto"}}>
          {TABS.filter(t => t.id !== "dash" || isAdmin).map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              background:"transparent",border:"none",cursor:"pointer",
              padding:"11px 16px",fontFamily:"inherit",fontSize:13,fontWeight:500,
              color:tab===t.id?WHITE:"rgba(255,255,255,0.4)",
              borderBottom:tab===t.id?`2px solid ${GOLD}`:"2px solid transparent",
              display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
              {t.label}
              {counts[t.id]>0 &&
                <span style={{background:tab===t.id?GOLD+"33":"rgba(255,255,255,0.1)",
                  color:tab===t.id?GOLD:"rgba(255,255,255,0.35)",
                  borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}}>
                  {counts[t.id]}
                </span>}
            </button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:900,margin:"0 auto",padding:"22px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",
          alignItems:"flex-start",marginBottom:22}}>
          <div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:23,
              fontWeight:600,color:TEXT,margin:0}}>{cur?.label}</h2>
            <p style={{color:MUTED,fontSize:12,margin:"4px 0 0",fontStyle:"italic"}}>
              {cur?.sub}</p>

              display:"flex",alignItems:"center",gap:7,background:TEAL,
              color:WHITE,border:"none",borderRadius:7,padding:"9px 18px",
              cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit",
              boxShadow:`0 2px 10px ${TEAL}55`}}>
              <span style={{fontSize:16,lineHeight:1}}>+</span>{" "}
              {tab==="pub"&&!isAdmin?"Subir publicación":"Agregar"}

          )}

        {tab==="dash" && <DashboardPanel acts={acts} pubs={pubs} convs={convs} labs={labs}/>}

        {/* CALENDARIO */}
        {tab==="cal" && <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {acts.length===0 && <Empty msg="No hay actividades programadas aún."/>}
          {isAdmin && acts.filter(a=>a.estado==="Realizado").length>0 && (
            <div style={{fontSize:11,color:MUTED,background:TEAL_L,borderRadius:6,padding:"6px 12px",display:"flex",alignItems:"center",gap:6}}>
              <span>📋</span> Hay {acts.filter(a=>a.estado==="Realizado").length} actividad(es) realizadas en el historial. Los miembros no las ven; vos sí como administrador.
            </div>
          )}
          {acts.filter(a => isAdmin || a.estado !== "Realizado").map(a=>(
            <div key={a.id} style={{background:WHITE,borderRadius:10,
              border:`1px solid ${BORDER}`,display:"flex",gap:16,
              padding:"16px 20px",alignItems:"flex-start"}}>
              <DateBox fecha={a.fecha}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                  {a.tipo && <TipoBadge t={a.tipo}/>}
                  {a.estado && <Badge t={a.estado}/>}
                </div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,
                  fontWeight:600,color:TEXT,lineHeight:1.4,marginBottom:10}}>{a.titulo}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px 16px"}}>
                  {a.horario    && <MetaRow icon="🕐" text={a.horario}/>}
                  {a.ponente    && <MetaRow icon="🎙" text={a.ponente}/>}
                  {a.moderador  && <MetaRow icon="👤" text={"Mod: "+a.moderador}/>}
                  {a.laboratorio && <MetaRow icon="🔬" text={a.laboratorio} accent/>}
                </div>
                {a.link && <a href={a.link} target="_blank" rel="noreferrer"
                  style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:10,
                    fontSize:11,fontWeight:600,color:TEAL,textDecoration:"none",
                    padding:"4px 10px",borderRadius:4,background:TEAL_L}}>
                  🔗 Acceder al Zoom</a>}
              </div>
              <EditDel type="cal" item={a}/>
            </div>
          ))}
        </div>}

        {/* LABORATORIOS */}
        {tab==="lab" && <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {labs.length===0 && <Empty msg="Los laboratorios se cargarán en cuanto estén confirmados."/>}
          {labs.map(l=>(
            <div key={l.id} style={{background:WHITE,borderRadius:10,
              border:`1px solid ${BORDER}`,overflow:"hidden",position:"relative"}}>
              <div style={{position:"absolute",top:10,right:10,zIndex:1}}>
                <EditDel type="lab" item={l}/>
              </div>
              <div style={{borderLeft:`5px solid ${TEAL}`,padding:"18px 24px 14px",
                background:`linear-gradient(to right,${TEAL_L},${WHITE})`}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",
                  textTransform:"uppercase",color:GOLD,marginBottom:6}}>{l.area||"Interdisciplinar"}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,
                  fontWeight:600,color:TEXT,lineHeight:1.25,paddingRight:60,
                  marginBottom:l.director?10:0}}>{l.nombre}</div>
                {l.director && <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:TEAL,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:11,fontWeight:700,color:WHITE,flexShrink:0}}>
                    {(l.director.split(" ").slice(-1)[0]||"").slice(0,2).toUpperCase()}
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:TEAL}}>{l.director}</div>
                    <div style={{fontSize:10,color:MUTED}}>Director del Laboratorio</div>
                  </div>
                </div>}
              </div>
              <div style={{padding:"14px 24px 18px"}}>
                {l.objetivos && <div style={{marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.08em",
                    textTransform:"uppercase",marginBottom:5}}>Objetivos</div>
                  <div style={{fontSize:13,color:"#444",lineHeight:1.65}}>{l.objetivos}</div>
                </div>}
                {l.temas && <div style={{marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.08em",
                    textTransform:"uppercase",marginBottom:6}}>Temas de investigación</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {l.temas.split(",").map((t,i)=>
                      <span key={i} style={{padding:"3px 10px",borderRadius:20,fontSize:11,
                        background:TEAL_L,color:TEAL,fontWeight:500,
                        border:`1px solid ${TEAL}22`}}>{t.trim()}</span>)}
                  </div>
                </div>}
                {l.investigadores && <div style={{marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.08em",
                    textTransform:"uppercase",marginBottom:5}}>Investigadores</div>
                  <div style={{fontSize:12,color:"#555",fontStyle:"italic",lineHeight:1.5}}>
                    {l.investigadores}</div>
                </div>}
                <div style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",borderTop:`1px solid ${BORDER}`,paddingTop:12,marginTop:4}}>
                  {l.estado && <Badge t={l.estado}/>}
                  <button onClick={()=>setJoinLab(l)} style={{
                    display:"flex",alignItems:"center",gap:6,
                    background:GOLD_L,color:GOLD,border:`1px solid ${GOLD}44`,
                    borderRadius:6,padding:"7px 16px",cursor:"pointer",
                    fontSize:12,fontWeight:600,fontFamily:"inherit"}}>
                    ✚ Solicitar adhesión
                  </button>
                </div>
              </div>
            </div>
          ))}

          {isAdmin && sols.length>0 && (
            <div style={{marginTop:8,background:GOLD_L,borderRadius:10,
              border:`1px solid ${GOLD}44`,padding:"16px 20px"}}>
              <div style={{fontSize:11,fontWeight:700,color:GOLD,letterSpacing:"0.08em",
                textTransform:"uppercase",marginBottom:12}}>
                Solicitudes pendientes ({sols.length})
              </div>
              {sols.map((s,i)=>(
                <div key={s.id} style={{fontSize:12,color:TEXT,padding:"10px 0",
                  borderBottom:i<sols.length-1?`1px solid ${GOLD}22`:"none",
                  display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                  <div>
                    <strong>{s.nombre}</strong> — {s.email}<br/>
                    <span style={{color:MUTED,fontSize:11}}>Lab: {s.laboratorio}</span>
                    {s.motivacion && <div style={{color:"#555",marginTop:2,
                      fontStyle:"italic",fontSize:11}}>{s.motivacion}</div>}
                  </div>
                  <button onClick={()=>procesarSol(s.id)} style={{
                    background:TEAL,color:WHITE,border:"none",borderRadius:4,
                    padding:"5px 12px",cursor:"pointer",fontSize:11,
                    fontFamily:"inherit",flexShrink:0}}>Procesar</button>
                </div>
              ))}
            </div>
          )}
        </div>}

        {/* REPOSITORIO */}
        {tab==="pub" && <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {pubs.length===0 && <Empty msg="El repositorio se irá completando con las publicaciones de los laboratorios."/>}
          {pubs.map(p=>(
            <div key={p.id} style={{background:WHITE,borderRadius:10,
              border:`1px solid ${BORDER}`,padding:"14px 20px",
              display:"flex",gap:14,alignItems:"flex-start"}}>
              <div style={{width:44,height:44,borderRadius:8,background:TEAL_L,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:20,flexShrink:0}}>📄</div>
              <div style={{flex:1,minWidth:0}}>
                {p.tipo && <span style={{display:"inline-block",marginBottom:5,
                  padding:"2px 7px",borderRadius:3,fontSize:10,fontWeight:600,
                  background:GOLD_L,color:GOLD,letterSpacing:"0.05em",
                  textTransform:"uppercase"}}>{p.tipo}</span>}
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,
                  fontWeight:600,color:TEXT,lineHeight:1.4,marginBottom:5}}>{p.titulo}</div>
                <div style={{fontSize:12,color:MUTED,display:"flex",gap:10,flexWrap:"wrap"}}>
                  {p.autores && <span>{p.autores}</span>}
                  {p.revista && <span>· {p.revista}</span>}
                  {p.fecha   && <span style={{color:"#AAA"}}>· {fmt(p.fecha)}</span>}
                </div>
                {p.laboratorio && <div style={{fontSize:11,color:TEAL,
                  marginTop:5,fontWeight:500}}>🔬 {p.laboratorio}</div>}
                {p.resumen && <div style={{fontSize:12,color:"#555",marginTop:8,
                  lineHeight:1.6,borderTop:`1px solid ${BORDER}`,paddingTop:8}}>
                  {p.resumen}</div>}
                {p.link && <a href={p.link} target="_blank" rel="noreferrer"
                  style={{display:"inline-block",marginTop:7,fontSize:11,
                    color:TEAL,fontWeight:600,textDecoration:"none"}}>
                  Ver / Descargar →</a>}
              </div>
              <EditDel type="pub" item={p}/>
            </div>
          ))}
        </div>}

        {/* CONVOCATORIAS */}
        {tab==="conv" && <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {convs.length===0 && <Empty msg="Circulá oportunidades de publicación para los investigadores."/>}
          {[...convs].sort((a,b)=>(a.fechaLimite||"9")>(b.fechaLimite||"9")?1:-1).map(c=>{
            const days   = daysLeft(c.fechaLimite);
            const urgent = days!==null && days<=14 && days>=0;
            return (
              <div key={c.id} style={{background:WHITE,borderRadius:10,
                border:`1px solid ${BORDER}`,
                borderLeft:urgent?`4px solid ${GOLD}`:`1px solid ${BORDER}`,
                padding:"16px 20px",display:"flex",gap:16,alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                    {c.tipo   && <TipoBadge t={c.tipo}/>}
                    {c.estado && <Badge t={c.estado}/>}
                    {urgent   && <span style={{padding:"2px 7px",borderRadius:3,fontSize:10,
                      fontWeight:700,background:GOLD_L,color:GOLD,
                      textTransform:"uppercase",letterSpacing:"0.05em"}}>¡Urgente!</span>}
                  </div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,
                    fontWeight:600,color:TEXT,lineHeight:1.4,marginBottom:8}}>{c.nombre}</div>
                  <div style={{fontSize:12,color:MUTED,display:"flex",flexWrap:"wrap",gap:"4px 14px"}}>
                    {c.editorial   && <MetaRow icon="🏛" text={c.editorial}/>}
                    {c.area        && <MetaRow icon="📌" text={c.area}/>}
                    {c.laboratorio && <MetaRow icon="🔬" text={c.laboratorio} accent/>}
                  </div>
                  {c.descripcion && <div style={{fontSize:12,color:"#555",marginTop:9,
                    lineHeight:1.6,borderTop:`1px solid ${BORDER}`,paddingTop:9}}>
                    {c.descripcion}</div>}
                  {c.link && <a href={c.link} target="_blank" rel="noreferrer"
                    style={{display:"inline-block",marginTop:8,fontSize:11,
                      color:TEAL,fontWeight:600,textDecoration:"none"}}>
                    Ver convocatoria →</a>}
                </div>
                <div style={{display:"flex",flexDirection:"column",
                  alignItems:"flex-end",gap:8,flexShrink:0}}>
                  {c.fechaLimite && days!==null && (
                    <div style={{textAlign:"center",
                      background:urgent?GOLD_L:TEAL_L,borderRadius:8,
                      padding:"10px 12px",minWidth:52}}>
                      <div style={{fontSize:24,fontWeight:700,
                        fontFamily:"'Cormorant Garamond',serif",
                        color:urgent?GOLD:TEAL,lineHeight:1}}>{Math.max(0,days)}</div>
                      <div style={{fontSize:9,textTransform:"uppercase",fontWeight:700,
                        color:urgent?GOLD+"99":TEAL+"99",marginTop:2}}>
                        {days<=0?"vencida":"días"}</div>
                      <div style={{fontSize:9,color:"#CCC",marginTop:4}}>
                        {fmt(c.fechaLimite)}</div>
                    </div>
                  )}
                  <EditDel type="conv" item={c}/>
                </div>
              </div>
            );
          })}
        </div>}

        {/* VIDEOTECA */}
        {tab==="vid" && <Videoteca
          vids={vids}
          isAdmin={isAdmin}
          onAdd={()=>setVideoModal(true)}
          onDelete={handleDeleteVideo}
        />}
      </div>

      <div style={{textAlign:"center",padding:"24px 20px 32px",
        borderTop:`1px solid ${BORDER}`,marginTop:20}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",color:"#BBC8C8",
          fontSize:15,letterSpacing:"0.12em",marginBottom:4}}>CIEPE</div>
        <div style={{fontSize:10,color:"#C8D0D0",letterSpacing:"0.08em",textTransform:"uppercase"}}>
          Centro Interdisciplinario en Ética, Política y Economía
        </div>
      </div>

      {videoModal && <VideoModal onSave={handleSaveVideo} onClose={()=>setVideoModal(false)}/>}
      {modal   && <EntryModal type={modal.type} initial={modal.item}
                    onSave={handleSave} onClose={()=>setModal(null)}/>}
      {joinLab && <JoinModal lab={joinLab} onClose={()=>setJoinLab(null)} profile={profile}/>}
    </div>
  );
}

// ── RAÍZ ──────────────────────────────────────────────────────────────────────

function Root() {
  const [user,setUser]       = useState(undefined);
  const [profile,setProfile] = useState(null);

  useEffect(()=>{
    return auth.onAuthStateChanged(async u=>{
      if (u) {
        setUser(u);
        const doc = await db.collection("usuarios").doc(u.uid).get();
        setProfile(doc.exists
          ? doc.data()
          : {nombre:"Usuario",apellido:"",email:u.email,role:"member"});
      } else {
        setUser(null);
        setProfile(null);
      }
    });
  },[]);

  if (user===undefined) return (
    <div style={{minHeight:"100vh",background:TEAL_D,display:"flex",
      alignItems:"center",justifyContent:"center"}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",color:WHITE,
        fontSize:32,letterSpacing:"0.1em",opacity:0.7}}>CIEPE</div>
    </div>
  );

  if (!user) return <LoginScreen/>;
  return <MainApp profile={profile} onLogout={()=>auth.signOut()}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
