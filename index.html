<script>
/* Logo CIEPE - SVG inline como fallback institucional */
window.CIEPE_LOGO = (function(){
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">'
    + '<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0F4446"/><stop offset="100%" stop-color="#17666A"/></linearGradient></defs>'

    + '<text x="100" y="88" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="#C4993A" letter-spacing="4">CIEPE</text>'
    + '<text x="100" y="118" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="rgba(255,255,255,0.75)" letter-spacing="1">ÉTICA · POLÍTICA</text>'
    + '<text x="100" y="138" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="rgba(255,255,255,0.75)" letter-spacing="1">ECONOMÍA</text>'
    + '</svg>';
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
})();

/* También intentamos cargar icon.png real del repo */
(function(){
  var base = window.location.pathname.replace(/\/[^\/]*$/,'');
  var img = new Image();
  img.onload = function(){
    window.CIEPE_LOGO = img.src;
    document.querySelectorAll('img.ciepe-logo').forEach(function(el){el.src=img.src;});
  };
  img.src = base + '/icon.png';
})();

<script type="text/babel">
const firebaseConfig={apiKey:"AIzaSyB3UnTPdojbnChToQqvL2OOdqbz3v5e-4g",authDomain:"ciepe---hub.firebaseapp.com",projectId:"ciepe---hub",storageBucket:"ciepe---hub.firebasestorage.app",messagingSenderId:"622358314474",appId:"1:622358314474:web:33b12436b9599a812b8693"};

const MONTHS=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

const TIPO_C={Ponencia:TEAL,Panel:"#5B4A8A",Seminario:"#2E7D52",Charla:GOLD,Webinar:"#B05E1A",Lanzamiento:"#A02828"};

function CiepeLogo({size=44,style={}}){
  const[src,setSrc]=useState(window.CIEPE_LOGO);

function DateBox({fecha}){

const inp={width:"100%",padding:"8px 11px",border:`1px solid ${BORDER}`,borderRadius:6,fontSize:13,boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif",outline:"none",color:TEXT,background:WHITE};
const Field=({label,children})=><div style={{marginBottom:14}}><label style={{display:"block",fontSize:11,fontWeight:600,color:MUTED,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</label>{children}</div>;
function Inp({k,label,type="text",opts,fd,sf}){
  return<Field label={label}>{opts
    ?<select value={fd[k]||""} onChange={e=>sf(k,e.target.value)} style={inp}><option value="">—</option>{opts.map(o=><option key={o}>{o}</option>)}</select>
    :type==="textarea"
    ?<textarea value={fd[k]||""} onChange={e=>sf(k,e.target.value)} rows={3} style={{...inp,resize:"vertical"}}/>
    :<input type={type} value={fd[k]||""} onChange={e=>sf(k,e.target.value)} style={inp}/>
  }</Field>;
}

function ChartBar({data,labels,colors}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new window.Chart(ref.current,{type:"bar",data:{labels,datasets:[{data,backgroundColor:colors||labels.map((_,i)=>[TEAL,GOLD,"#5B4A8A","#2E7D52","#C0392B","#E67E22"][i%6]),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:MUTED,font:{size:10}}},y:{grid:{color:"#F0F0F0"},ticks:{color:MUTED,font:{size:10},precision:0},beginAtZero:true}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[JSON.stringify(data),JSON.stringify(labels)]);
  return<div style={{position:"relative",height:150}}><canvas ref={ref}/></div>;
}

function ChartDoughnut({data,labels,colors}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(chartRef.current)chartRef.current.destroy();
    const total=data.reduce((a,b)=>a+b,0);
    chartRef.current=new window.Chart(ref.current,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors||[TEAL,GOLD,"#5B4A8A","#2E7D52","#C0392B","#E67E22","#3498DB"],borderWidth:2,borderColor:"#fff",hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:"65%",plugins:{legend:{position:"bottom",labels:{font:{size:9},padding:6,color:MUTED,boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed} (${total?Math.round(ctx.parsed/total*100):0}%)`}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[JSON.stringify(data),JSON.stringify(labels)]);
  return<div style={{position:"relative",height:170}}><canvas ref={ref}/></div>;
}

function LoginScreen(){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");const[pass,setPass]=useState("");
  const[nombre,setNombre]=useState("");const[apellido,setApellido]=useState("");
  const[institucion,setInst]=useState("");
  const[error,setError]=useState("");const[loading,setLoading]=useState(false);
  const[resetSent,setResetSent]=useState(false);
  async function resetPassword(){if(!email){setError("Ingresá tu correo.");return;}try{await auth.sendPasswordResetEmail(email);setResetSent(true);setError("");}catch(e){const m={"auth/user-not-found":"No existe cuenta con ese correo.","auth/invalid-email":"Correo inválido."};setError(m[e.code]||e.message);}}
  async function submit(){
    setError("");setLoading(true);
    try{
      if(mode==="login"){await auth.signInWithEmailAndPassword(email,pass);}
      else{if(!nombre||!apellido){setError("Ingresá nombre y apellido.");setLoading(false);return;}const cred=await auth.createUserWithEmailAndPassword(email,pass);const snap=await db.collection("usuarios").get();const role=snap.empty?"admin":"member";await db.collection("usuarios").doc(cred.user.uid).set({nombre,apellido,institucion,email,role,creadoEn:FieldValue.serverTimestamp()});}
    }catch(e){const m={"auth/user-not-found":"Usuario no encontrado.","auth/wrong-password":"Contraseña incorrecta.","auth/email-already-in-use":"Correo ya registrado.","auth/weak-password":"Mínimo 6 caracteres.","auth/invalid-email":"Correo inválido.","auth/invalid-credential":"Correo o contraseña incorrectos."};setError(m[e.code]||e.message);}
    setLoading(false);
  }
  return<div style={{minHeight:"100vh",background:TEAL_D,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:WHITE,borderRadius:16,padding:36,width:"100%",maxWidth:400,boxShadow:"0 32px 80px rgba(0,0,0,0.3)"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <CiepeLogo size={72} style={{marginBottom:12,boxShadow:"0 4px 20px rgba(15,68,70,0.15)"}}/>
        <div style={{fontFamily:"'Cormorant Garamond',serif",color:TEAL_D,fontSize:32,fontWeight:600,letterSpacing:"0.08em",lineHeight:1}}>CIEPE</div>
        <div style={{color:MUTED,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:6}}>Hub Académico</div>
        <div style={{width:40,height:2,background:GOLD,margin:"12px auto 0",borderRadius:1}}/>
        <div style={{fontSize:11,color:"#AAA",marginTop:10,fontStyle:"italic"}}>Centro Interdisciplinario en Ética, Política y Economía</div>
      </div>
      {mode==="register"&&<><div style={{display:"flex",gap:10}}><div style={{flex:1}}><Field label="Nombre"><input value={nombre} onChange={e=>setNombre(e.target.value)} style={inp}/></Field></div><div style={{flex:1}}><Field label="Apellido"><input value={apellido} onChange={e=>setApellido(e.target.value)} style={inp}/></Field></div></div><Field label="Institución (opcional)"><input value={institucion} onChange={e=>setInst(e.target.value)} style={inp}/></Field></>}
      <Field label="Correo electrónico"><input type="email" value={email} onChange={e=>setEmail(e.target.value)} style={inp}/></Field>
      <Field label="Contraseña"><input type="password" value={pass} onChange={e=>setPass(e.target.value)} style={inp} onKeyDown={e=>e.key==="Enter"&&submit()}/></Field>
      {error&&<div style={{fontSize:12,color:"#A02828",marginBottom:14,padding:"8px 12px",background:"#FFF0F0",borderRadius:6,lineHeight:1.5}}>{error}</div>}
      {mode==="login"&&!resetSent&&<div style={{textAlign:"right",marginBottom:10,marginTop:-6}}><button onClick={resetPassword} style={{background:"none",border:"none",cursor:"pointer",color:TEAL,fontSize:11,fontFamily:"inherit",textDecoration:"underline",padding:0}}>¿Olvidaste tu contraseña?</button></div>}
      {resetSent&&<div style={{fontSize:12,color:"#2E7D52",marginBottom:14,padding:"10px 14px",background:"#F0FBF4",borderRadius:6,lineHeight:1.6,border:"1px solid #2E7D5233"}}>✅ Email enviado a <strong>{email}</strong>. Revisá también spam.</div>}
      <button onClick={submit} disabled={loading} style={{width:"100%",background:TEAL,color:WHITE,border:"none",padding:"13px",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:"inherit",marginBottom:16,boxShadow:`0 2px 12px ${TEAL}55`,opacity:loading?0.7:1}}>{loading?"...":mode==="login"?"Iniciar sesión":"Registrarse"}</button>
      <div style={{textAlign:"center",fontSize:13,color:MUTED}}>
        {mode==="login"?<>¿No tenés cuenta?{" "}<button onClick={()=>{setMode("register");setError("");}} style={{background:"none",border:"none",color:TEAL,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600}}>Registrarse</button></>:<>¿Ya tenés cuenta?{" "}<button onClick={()=>{setMode("login");setError("");}} style={{background:"none",border:"none",color:TEAL,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600}}>Iniciar sesión</button></>}
      </div>
    </div>
  </div>;
}

      {type==="conv"&&<><Inp k="nombre" label="Convocatoria" fd={fd} sf={sf}/><Inp k="tipo" label="Tipo" opts={["Revista científica","Capítulo de libro","Congreso","Libro colectivo","Premio"]} fd={fd} sf={sf}/><Inp k="area" label="Área temática" fd={fd} sf={sf}/><Inp k="editorial" label="Editorial / Org." fd={fd} sf={sf}/><Inp k="fechaLimite" label="Fecha límite" type="date" fd={fd} sf={sf}/><Inp k="estado" label="Estado" opts={["Abierta","Próximamente","Cerrada"]} fd={fd} sf={sf}/><Inp k="laboratorio" label="Laboratorio relevante" fd={fd} sf={sf}/><Inp k="link" label="Link" fd={fd} sf={sf}/><Inp k="descripcion" label="Descripción" type="textarea" fd={fd} sf={sf}/></>}
      <button onClick={()=>onSave(fd)} style={{width:"100%",background:isEdit?GOLD:TEAL,color:WHITE,border:"none",padding:"12px",borderRadius:7,cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:"inherit",marginTop:8}}>{isEdit?"Guardar cambios":"Agregar"}</button>
    </div>
  </div>;
}

function JoinModal({lab,onClose,profile}){
  const[fd,setFd]=useState({nombre:(profile?.nombre||"")+" "+(profile?.apellido||""),email:profile?.email||"",institucion:profile?.institucion||"",motivacion:""});

  const[sent,setSent]=useState(false);
  async function send(){if(!fd.nombre||!fd.email)return;await db.collection("solicitudes").add({...fd,laboratorio:lab.nombre,estado:"Pendiente",creadoEn:FieldValue.serverTimestamp()});setSent(true);setTimeout(onClose,2500);}

        <Field label="Institución"><input value={fd.institucion} onChange={e=>sf("institucion",e.target.value)} style={inp}/></Field>

function ProcesarModal({sol,onConfirm,onClose}){

const TABS=[{id:"dash",label:"Panel CIEPE",sub:"Métricas y resumen"},{id:"cal",label:"Calendario",sub:"Actividades académicas"},{id:"lab",label:"Laboratorios",sub:"Grupos de investigación"},{id:"pub",label:"Repositorio",sub:"Publicaciones"},{id:"conv",label:"Convocatorias",sub:"Oportunidades abiertas"},{id:"vid",label:"Videoteca",sub:"Ponencias y conferencias"}];

function MainApp({profile,onLogout}){

  const[modal,setModal]=useState(null);const[videoModal,setVideoModal]=useState(false);const[joinLab,setJoinLab]=useState(null);const[procesarModal,setProcesarModal]=useState(null);const[toast,setToast]=useState(null);
  const isAdmin=profile?.role==="admin";
  function notify(msg){setToast(msg);setTimeout(()=>setToast(null),3500);}
  useEffect(()=>{
    const u=[
      db.collection("actividades").orderBy("fecha").onSnapshot(s=>setActs(s.docs.map(d=>({id:d.id,...d.data()}))),()=>db.collection("actividades").onSnapshot(s=>setActs(s.docs.map(d=>({id:d.id,...d.data()}))))),
      db.collection("laboratorios").orderBy("nombre").onSnapshot(s=>setLabs(s.docs.map(d=>({id:d.id,...d.data()}))),()=>db.collection("laboratorios").onSnapshot(s=>setLabs(s.docs.map(d=>({id:d.id,...d.data()}))))),
      db.collection("publicaciones").onSnapshot(s=>setPubs(s.docs.map(d=>({id:d.id,...d.data()})))),
      db.collection("convocatorias").onSnapshot(s=>setConvs(s.docs.map(d=>({id:d.id,...d.data()})))),
      db.collection("videos").orderBy("fecha","desc").onSnapshot(s=>setVids(s.docs.map(d=>({id:d.id,...d.data()}))),()=>db.collection("videos").onSnapshot(s=>setVids(s.docs.map(d=>({id:d.id,...d.data()}))))),
      db.collection("solicitudes").where("estado","==","Pendiente").onSnapshot(s=>setSols(s.docs.map(d=>({id:d.id,...d.data()})))),
    ];
    return()=>u.forEach(f=>f());
  },[]);
  async function handleSave(data){const col=COL[modal.type];if(data.id){const{id,...rest}=data;await db.collection(col).doc(id).update(rest);notify("Registro actualizado.");}else{await db.collection(col).add({...data,creadoEn:FieldValue.serverTimestamp()});notify("Registro guardado.");}setModal(null);}

  async function handleDeleteVideo(vid){if(!confirm("¿Eliminar este video?"))return;await db.collection("videos").doc(vid).delete();notify("Video eliminado.");}
  async function del(col,id){if(!confirm("¿Confirmar eliminación?"))return;await db.collection(col).doc(id).delete();notify("Eliminado.");}
  async function confirmarProcesada(id){await db.collection("solicitudes").doc(id).update({estado:"Procesada"});notify("Solicitud procesada.");setProcesarModal(null);}
  const cur=TABS.find(t=>t.id===tab);
  const counts={cal:acts.length,lab:labs.length,pub:pubs.length,conv:convs.length,vid:vids.length};
  const EditDel=({type,item})=>isAdmin?<div style={{display:"flex",gap:2,flexShrink:0}}><button onClick={()=>setModal({type,item})} style={{background:"none",border:"none",cursor:"pointer",color:TEAL,fontSize:16,padding:"4px 6px",lineHeight:1}}>✎</button><button onClick={()=>del(COL[type],item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#CCC",fontSize:16,padding:"4px 6px",lineHeight:1}}>✕</button></div>:null;
  return<div style={{minHeight:"100vh",background:OFF_W}}>
    {toast&&<Toast msg={toast}/>}
    <div style={{background:TEAL_D}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 22px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <CiepeLogo size={44} style={{border:"2px solid rgba(196,153,58,0.5)"}}/>
          <div>
            <div style={{display:"flex",alignItems:"baseline",gap:10}}><span style={{fontFamily:"'Cormorant Garamond',serif",color:WHITE,fontSize:24,fontWeight:600,letterSpacing:"0.06em",lineHeight:1}}>CIEPE</span><span style={{width:1,height:14,background:"rgba(255,255,255,0.2)",display:"inline-block",marginBottom:1}}/><span style={{color:GOLD,fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:500}}>Hub Académico</span></div>
            <div style={{color:"rgba(255,255,255,0.3)",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:2}}>Ética · Política · Economía</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div style={{color:"rgba(255,255,255,0.9)",fontSize:12,fontWeight:500,lineHeight:1}}>{profile?.nombre} {profile?.apellido}</div>
            <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,marginTop:2}}>{isAdmin?"Coordinador Académico":"Investigador"}</div>
            {isAdmin&&sols.length>0&&<div style={{fontSize:10,color:GOLD,marginTop:2,fontWeight:600}}>{sols.length} solicitud{sols.length>1?"es":""} pendiente{sols.length>1?"s":""}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:TEAL_D}}>{(profile?.nombre||"?")[0]}{(profile?.apellido||"")[0]}</div>
            <button onClick={onLogout} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"inherit",padding:0}}>salir</button>
          </div>
        </div>
      </div>
      <div style={{display:"flex",padding:"0 14px",borderTop:"1px solid rgba(255,255,255,0.07)",overflowX:"auto"}}>
        {TABS.filter(t=>t.id!=="dash"||isAdmin).map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:"transparent",border:"none",cursor:"pointer",padding:"11px 16px",fontFamily:"inherit",fontSize:13,fontWeight:500,color:tab===t.id?WHITE:"rgba(255,255,255,0.4)",borderBottom:tab===t.id?`2px solid ${GOLD}`:"2px solid transparent",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>{t.label}{counts[t.id]>0&&<span style={{background:tab===t.id?GOLD+"33":"rgba(255,255,255,0.1)",color:tab===t.id?GOLD:"rgba(255,255,255,0.35)",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}}>{counts[t.id]}</span>}</button>)}
      </div>
    </div>
    <div style={{maxWidth:900,margin:"0 auto",padding:"22px 18px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
        <div><h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:23,fontWeight:600,color:TEXT,margin:0}}>{cur?.label}</h2><p style={{color:MUTED,fontSize:12,margin:"4px 0 0",fontStyle:"italic"}}>{cur?.sub}</p></div>
        {(isAdmin||tab==="pub")&&tab!=="dash"&&tab!=="vid"&&<button onClick={()=>setModal({type:tab,item:null})} style={{display:"flex",alignItems:"center",gap:7,background:TEAL,color:WHITE,border:"none",borderRadius:7,padding:"9px 18px",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit",boxShadow:`0 2px 10px ${TEAL}55`}}><span style={{fontSize:16,lineHeight:1}}>+</span>{tab==="pub"&&!isAdmin?"Subir publicación":"Agregar"}</button>}
      </div>
      {tab==="dash"&&<DashboardPanel acts={acts} pubs={pubs} convs={convs} labs={labs}/>}
      {tab==="cal"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        {acts.length===0&&<Empty msg="No hay actividades programadas aún."/>}
        {acts.filter(a=>isAdmin||a.estado!=="Realizado").map(a=><div key={a.id} style={{background:WHITE,borderRadius:10,border:`1px solid ${BORDER}`,display:"flex",gap:16,padding:"16px 20px",alignItems:"flex-start"}}>
          <DateBox fecha={a.fecha}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{a.tipo&&<TipoBadge t={a.tipo}/>}{a.estado&&<Badge t={a.estado}/>}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:TEXT,lineHeight:1.4,marginBottom:10}}>{a.titulo}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"4px 16px"}}>{a.horario&&<MetaRow icon="🕐" text={a.horario}/>}{a.ponente&&<MetaRow icon="🎙" text={a.ponente}/>}{a.moderador&&<MetaRow icon="👤" text={"Mod: "+a.moderador}/>}{a.laboratorio&&<MetaRow icon="🔬" text={a.laboratorio} accent/>}</div>
            {a.link&&<a href={a.link} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:10,fontSize:11,fontWeight:600,color:TEAL,textDecoration:"none",padding:"4px 10px",borderRadius:4,background:TEAL_L}}>🔗 Acceder al Zoom</a>}
          </div>
          <EditDel type="cal" item={a}/>
        </div>)}
      </div>}
      {tab==="lab"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
        {labs.length===0&&<Empty msg="Los laboratorios se cargarán en cuanto estén confirmados."/>}
        {labs.map(l=><div key={l.id} style={{background:WHITE,borderRadius:10,border:`1px solid ${BORDER}`,overflow:"hidden",position:"relative"}}>
          <div style={{position:"absolute",top:10,right:10,zIndex:1}}><EditDel type="lab" item={l}/></div>
          <div style={{borderLeft:`5px solid ${TEAL}`,padding:"18px 24px 14px",background:`linear-gradient(to right,${TEAL_L},${WHITE})`}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:GOLD,marginBottom:6}}>{l.area||"Interdisciplinar"}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:TEXT,lineHeight:1.25,paddingRight:60,marginBottom:l.director?10:0}}>{l.nombre}</div>
            {l.director&&<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:28,height:28,borderRadius:"50%",background:TEAL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:WHITE,flexShrink:0}}>{(l.director.split(" ").slice(-1)[0]||"").slice(0,2).toUpperCase()}</div><div><div style={{fontSize:12,fontWeight:600,color:TEAL}}>{l.director}</div><div style={{fontSize:10,color:MUTED}}>Director del Laboratorio</div></div></div>}
          </div>
          <div style={{padding:"14px 24px 18px"}}>
            {l.objetivos&&<div style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>Objetivos</div><div style={{fontSize:13,color:"#444",lineHeight:1.65}}>{l.objetivos}</div></div>}
            {l.temas&&<div style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Temas</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{l.temas.split(",").map((t,i)=><span key={i} style={{padding:"3px 10px",borderRadius:20,fontSize:11,background:TEAL_L,color:TEAL,fontWeight:500,border:`1px solid ${TEAL}22`}}>{t.trim()}</span>)}</div></div>}
            {l.investigadores&&<div style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>Investigadores</div><div style={{fontSize:12,color:"#555",fontStyle:"italic",lineHeight:1.5}}>{l.investigadores}</div></div>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid ${BORDER}`,paddingTop:12,marginTop:4}}>{l.estado&&<Badge t={l.estado}/>}<button onClick={()=>setJoinLab(l)} style={{display:"flex",alignItems:"center",gap:6,background:GOLD_L,color:GOLD,border:`1px solid ${GOLD}44`,borderRadius:6,padding:"7px 16px",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>✚ Solicitar adhesión</button></div>
          </div>
        </div>)}
        {isAdmin&&sols.length>0&&<div style={{marginTop:8,background:GOLD_L,borderRadius:10,border:`1px solid ${GOLD}44`,padding:"16px 20px"}}>
          <div style={{fontSize:11,fontWeight:700,color:GOLD,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Solicitudes pendientes ({sols.length})</div>
          {sols.map((s,i)=><div key={s.id} style={{fontSize:12,color:TEXT,padding:"10px 0",borderBottom:i<sols.length-1?`1px solid ${GOLD}22`:"none",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}><div><strong>{s.nombre}</strong> — {s.email}<br/><span style={{color:MUTED,fontSize:11}}>Lab: {s.laboratorio}</span>{s.motivacion&&<div style={{color:"#555",marginTop:2,fontStyle:"italic",fontSize:11}}>{s.motivacion}</div>}</div><button onClick={()=>setProcesarModal(s)} style={{background:TEAL,color:WHITE,border:"none",borderRadius:4,padding:"5px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit",flexShrink:0}}>Procesar</button></div>)}
        </div>}
      </div>}
      {tab==="pub"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {pubs.length===0&&<Empty msg="El repositorio se irá completando con las publicaciones de los laboratorios."/>}
        {pubs.map(p=><div key={p.id} style={{background:WHITE,borderRadius:10,border:`1px solid ${BORDER}`,padding:"14px 20px",display:"flex",gap:14,alignItems:"flex-start"}}>
          <div style={{width:44,height:44,borderRadius:8,background:TEAL_L,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📄</div>
          <div style={{flex:1,minWidth:0}}>
            {p.tipo&&<span style={{display:"inline-block",marginBottom:5,padding:"2px 7px",borderRadius:3,fontSize:10,fontWeight:600,background:GOLD_L,color:GOLD,letterSpacing:"0.05em",textTransform:"uppercase"}}>{p.tipo}</span>}
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600,color:TEXT,lineHeight:1.4,marginBottom:5}}>{p.titulo}</div>
            <div style={{fontSize:12,color:MUTED,display:"flex",gap:10,flexWrap:"wrap"}}>{p.autores&&<span>{p.autores}</span>}{p.revista&&<span>· {p.revista}</span>}{p.fecha&&<span style={{color:"#AAA"}}>· {fmt(p.fecha)}</span>}</div>
            {p.laboratorio&&<div style={{fontSize:11,color:TEAL,marginTop:5,fontWeight:500}}>🔬 {p.laboratorio}</div>}
            {p.resumen&&<div style={{fontSize:12,color:"#555",marginTop:8,lineHeight:1.6,borderTop:`1px solid ${BORDER}`,paddingTop:8}}>{p.resumen}</div>}
            {p.link&&<a href={p.link} target="_blank" rel="noreferrer" style={{display:"inline-block",marginTop:7,fontSize:11,color:TEAL,fontWeight:600,textDecoration:"none"}}>Ver / Descargar →</a>}
          </div>
          <EditDel type="pub" item={p}/>
        </div>)}
      </div>}
      {tab==="conv"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        {convs.length===0&&<Empty msg="Circulá oportunidades de publicación para los investigadores."/>}
        {[...convs].sort((a,b)=>(a.fechaLimite||"9")>(b.fechaLimite||"9")?1:-1).map(c=>{
          const days=daysLeft(c.fechaLimite);const urgent=days!==null&&days<=14&&days>=0;
          return<div key={c.id} style={{background:WHITE,borderRadius:10,border:`1px solid ${BORDER}`,borderLeft:urgent?`4px solid ${GOLD}`:`1px solid ${BORDER}`,padding:"16px 20px",display:"flex",gap:16,alignItems:"flex-start"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{c.tipo&&<TipoBadge t={c.tipo}/>}{c.estado&&<Badge t={c.estado}/>}{urgent&&<span style={{padding:"2px 7px",borderRadius:3,fontSize:10,fontWeight:700,background:GOLD_L,color:GOLD,textTransform:"uppercase"}}>¡Urgente!</span>}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:TEXT,lineHeight:1.4,marginBottom:8}}>{c.nombre}</div>
              <div style={{fontSize:12,color:MUTED,display:"flex",flexWrap:"wrap",gap:"4px 14px"}}>{c.editorial&&<MetaRow icon="🏛" text={c.editorial}/>}{c.area&&<MetaRow icon="📌" text={c.area}/>}{c.laboratorio&&<MetaRow icon="🔬" text={c.laboratorio} accent/>}</div>
              {c.descripcion&&<div style={{fontSize:12,color:"#555",marginTop:9,lineHeight:1.6,borderTop:`1px solid ${BORDER}`,paddingTop:9}}>{c.descripcion}</div>}
              {c.link&&<a href={c.link} target="_blank" rel="noreferrer" style={{display:"inline-block",marginTop:8,fontSize:11,color:TEAL,fontWeight:600,textDecoration:"none"}}>Ver convocatoria →</a>}
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,flexShrink:0}}>
              {c.fechaLimite&&days!==null&&<div style={{textAlign:"center",background:urgent?GOLD_L:TEAL_L,borderRadius:8,padding:"10px 12px",minWidth:52}}><div style={{fontSize:24,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:urgent?GOLD:TEAL,lineHeight:1}}>{Math.max(0,days)}</div><div style={{fontSize:9,textTransform:"uppercase",fontWeight:700,color:urgent?GOLD+"99":TEAL+"99",marginTop:2}}>{days<=0?"vencida":"días"}</div><div style={{fontSize:9,color:"#CCC",marginTop:4}}>{fmt(c.fechaLimite)}</div></div>}
              <EditDel type="conv" item={c}/>
            </div>
          </div>;
        })}
      </div>}
      {tab==="vid"&&<Videoteca vids={vids} isAdmin={isAdmin} onAdd={()=>setVideoModal(true)} onDelete={handleDeleteVideo}/>}
    </div>
    <div style={{textAlign:"center",padding:"24px 20px 32px",borderTop:`1px solid ${BORDER}`,marginTop:20}}><div style={{fontFamily:"'Cormorant Garamond',serif",color:"#BBC8C8",fontSize:15,letterSpacing:"0.12em",marginBottom:4}}>CIEPE</div><div style={{fontSize:10,color:"#C8D0D0",letterSpacing:"0.08em",textTransform:"uppercase"}}>Centro Interdisciplinario en Ética, Política y Economía</div></div>
    {videoModal&&<VideoModal onSave={handleSaveVideo} onClose={()=>setVideoModal(false)}/>}
    {modal&&<EntryModal type={modal.type} initial={modal.item} onSave={handleSave} onClose={()=>setModal(null)}/>}
    {procesarModal&&<ProcesarModal sol={procesarModal} onConfirm={()=>confirmarProcesada(procesarModal.id)} onClose={()=>setProcesarModal(null)}/>}
    {joinLab&&<JoinModal lab={joinLab} onClose={()=>setJoinLab(null)} profile={profile}/>}
  </div>;
}

function Root(){
  const[user,setUser]=useState(undefined);const[profile,setProfile]=useState(null);
  useEffect(()=>{return auth.onAuthStateChanged(async u=>{if(u){setUser(u);const doc=await db.collection("usuarios").doc(u.uid).get();setProfile(doc.exists?doc.data():{nombre:"Usuario",apellido:"",email:u.email,role:"member"});}else{setUser(null);setProfile(null);}});},[]); 
  if(user===undefined)return<div style={{minHeight:"100vh",background:TEAL_D,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontFamily:"'Cormorant Garamond',serif",color:WHITE,fontSize:32,letterSpacing:"0.1em",opacity:0.7}}>CIEPE</div></div>;
  if(!user)return<LoginScreen/>;
  return<MainApp profile={profile} onLogout={()=>auth.signOut()}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
